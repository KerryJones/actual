name: Build and deploy finance image
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up environment
        uses: ./.github/actions/setup
      - run: yarn build:browser --skip-translations
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.finance
          push: true
          tags: ghcr.io/kerryjones/finance-actual:latest
      - name: Trigger Dokploy redeploy
        run: curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
