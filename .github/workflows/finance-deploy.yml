name: Build and deploy finance image
on:
  push:
    branches: [kerry/main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn workspace @actual-app/web build
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.finance
          push: true
          tags: ghcr.io/kerryjones/finance-actual:latest
      - name: Trigger Dokploy redeploy
        run: curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
